<!DOCTYPE html>
<html>
<head>
  <title>RehabAI Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      margin: 0;
      text-align: center;
    }

    h2 {
      background: #4CAF50;
      color: white;
      padding: 15px;
      margin: 0;
    }

    #exerciseList {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      width: 250px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      color: #555;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <h2>🏋️ RehabAI Dashboard</h2>

  <div id="exerciseList"></div>

  <script src="dashboard.js"></script>
  <button onclick="window.location.href='progress.html'">

    View Progress
  </button>

</body>
</html>
