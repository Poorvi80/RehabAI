<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RehabAI Pain Assessment</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: white;

      /* SAME BACKGROUND */
      background: linear-gradient(rgba(20,20,40,0.7), rgba(20,20,40,0.9)),
        url("https://images.unsplash.com/photo-1544367567-0f2fcb009e0b");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="flex justify-between px-8 py-5 bg-black/30 backdrop-blur-lg">
    <h1 class="text-xl font-bold">🏥 RehabAI</h1>

    <div class="flex gap-6">
      <a href="dashboard.html">Dashboard</a>
      <a href="pain.html">Pain</a>
      <a href="physio.html">Physio</a>
      <a href="progress.html">Progress</a>
    </div>
  </nav>

  <!-- TITLE -->
  <h1 class="text-4xl text-center mt-10 mb-10">
    🩺 Assess Your Pain Level
  </h1>

  <!-- MAIN CARD -->
  <div class="flex justify-center">

    <div class="glass w-[350px] shadow-2xl">

      <h2 class="text-xl mb-6">Pain Level: <span id="painValue">5</span></h2>

      <!-- SLIDER -->
      <input
        type="range"
        min="0"
        max="10"
        value="5"
        id="painSlider"
        class="w-full"
      />

      <!-- EMOJI FEEDBACK -->
      <div id="emoji" class="text-5xl mt-6">
        🙂 
      </div>

      <!-- TEXT FEEDBACK -->
      <p id="painText" class="mt-3 opacity-80">
        Moderate pain
      </p>

    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    const slider = document.getElementById("painSlider");
    const value = document.getElementById("painValue");
    const emoji = document.getElementById("emoji");
    const text = document.getElementById("painText");

    function updatePainUI(val) {
      value.innerText = val;

      if (val <= 2) {
        emoji.innerText = "😊";
        text.innerText = "Minimal pain";
      } else if (val <= 5) {
        emoji.innerText = "🙂";
        text.innerText = "Moderate pain";
      } else if (val <= 8) {
        emoji.innerText = "😖";
        text.innerText = "High pain";
      } else {
        emoji.innerText = "😭";
        text.innerText = "Severe pain";
      }
    }

    slider.addEventListener("input", (e) => {
      updatePainUI(e.target.value);
    });
  </script>

</body>
</html>
