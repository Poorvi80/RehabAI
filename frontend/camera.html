<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RehabAI Camera</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: white;
      background: linear-gradient(135deg, #667eea, #764ba2);
      text-align: center;
    }

    video, canvas {
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1 class="text-3xl mt-6 mb-4">🧠 Live Exercise Tracking</h1>

  <!-- CAMERA -->
  <div class="flex justify-center relative">
    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="output" width="640" height="480" class="absolute"></canvas>
  </div>

  <!-- METRICS -->
  <div class="flex justify-center gap-6 mt-6">
    <div>
      <p>Reps</p>
      <p id="reps">0</p>
    </div>

    <div>
      <p>Accuracy</p>
      <p id="accuracy">0%</p>
    </div>

    <div>
      <p>Stage</p>
      <p id="stage">-</p>
    </div>
  </div>

  <!-- AI MESSAGE -->
  <div class="mt-6">
    <p id="aiMessage">AI analyzing...</p>
  </div>

  <!-- BUTTONS -->
  <div class="mt-6">
    <button id="startBtn" class="bg-green-500 px-4 py-2 rounded">Start</button>
    <button id="stopBtn" class="bg-red-500 px-4 py-2 rounded ml-4">Stop</button>
  </div>

  <!-- MEDIAPIPE -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <!-- YOUR SCRIPT -->
  <script src="camera.js"></script>

</body>
</html>
