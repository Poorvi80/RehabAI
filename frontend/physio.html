<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RehabAI Physio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: white;

      /* SAME BACKGROUND */
      background: linear-gradient(rgba(20,20,40,0.7), rgba(20,20,40,0.9)),
        url("https://images.unsplash.com/photo-1544367567-0f2fcb009e0b");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="flex justify-between px-8 py-5 bg-black/30 backdrop-blur-lg">
    <h1 class="text-xl font-bold">🏥 RehabAI</h1>

    <div class="flex gap-6">
      <a href="dashboard.html">Dashboard</a>
      <a href="pain.html">Pain</a>
      <a href="physio.html">Physio</a>
      <a href="progress.html">Progress</a>
    </div>
  </nav>

  <!-- TITLE -->
  <h1 class="text-4xl text-center mt-10 mb-6">
    🧑‍⚕️ Find Physiotherapists
  </h1>

  <!-- SEARCH -->
  <div class="flex justify-center mb-10">
    <input
      id="searchInput"
      type="text"
      placeholder="Search by name or location..."
      class="glass w-[300px] px-4 py-2 text-white outline-none"
    />
  </div>

  <!-- DOCTOR LIST -->
  <div id="doctorList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-10">

  </div>

  <!-- SCRIPT -->
  <script>
    let doctors = [];

    async function fetchDoctors() {
      try {
        const res = await fetch("/api/physio");
        doctors = await res.json();
        displayDoctors(doctors);
      } catch (err) {
        console.error(err);
      }
    }

    function displayDoctors(data) {
      const container = document.getElementById("doctorList");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = `
          <div class="glass text-center col-span-3">
            ❌ No physiotherapists found
          </div>
        `;
        return;
      }

      data.forEach(doc => {
        const card = document.createElement("div");

        card.className =
          "glass shadow-lg hover:scale-105 transition duration-300";

        card.innerHTML = `
          <h2 class="text-xl font-bold mb-2">${doc.name}</h2>
          <p class="opacity-80 mb-1">📍 ${doc.location || "Unknown"}</p>
          <p class="opacity-80 mb-1">💼 ${doc.specialization || "General"}</p>
          <p class="opacity-80 mb-3">📞 ${doc.contact || "N/A"}</p>

          <button class="bg-purple-500 px-4 py-2 rounded-lg hover:bg-purple-600">
            Book Appointment
          </button>
        `;

        container.appendChild(card);
      });
    }

    // 🔍 SEARCH
    document.getElementById("searchInput").addEventListener("input", (e) => {
      const value = e.target.value.toLowerCase();

      const filtered = doctors.filter(doc =>
        doc.name.toLowerCase().includes(value) ||
        (doc.location || "").toLowerCase().includes(value)
      );

      displayDoctors(filtered);
    });

    fetchDoctors();
  </script>

</body>
</html>
